name: Regression Invariants

on:
  # push:
  #   branches:
  #     - main
  #     - "codex/**"
  pull_request:

jobs:
  regression-invariants:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: jobbot
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d jobbot"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd="redis-cli ping"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/jobbot
          DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/jobbot
        run: PYTHONPATH=. alembic upgrade head

      - name: Run focused regression invariants
        env:
          DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/jobbot
          DATABASE_URL_SYNC: postgresql+psycopg2://postgres:postgres@127.0.0.1:5432/jobbot
          REDIS_URL: redis://127.0.0.1:6379/0
        run: bash scripts/run_regression_invariants.sh
