name: AI Review (OpenRouter)

on:
  pull_request:
    types: [opened, synchronize, reopened]
  # push:
  #   branches:
  #     - main
  #     - develop
  #     - "feature/**"
  #     - "f/**"

concurrency:
  group: ai-review-openrouter-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ai-review:
    name: ai-review-openrouter
    permissions:
      contents: read
      pull-requests: write
      issues: write
    uses: marcopared/gh-reusable-workflows/.github/workflows/ai-code-review-openrouter.yml@main
    with:
      workflow_repo_ref: main
      model: "z-ai/glm-5"
      api_base: "https://openrouter.ai/api/v1"
      max_files: 25
      max_patch_chars: 120000
      post_pr_comment: true
      fail_on_blocking: true
      min_block_severity: high
      min_block_confidence: high
      extra_review_instructions: |
        Focus on correctness, security, and reliability.
        Never block on style-only feedback.
      http_referer: ""
      x_title: ""
    secrets:
      openrouter_api_key: ${{ secrets.OPENROUTER_API_KEY }}