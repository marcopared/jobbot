<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Dummy Job Application</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 2rem;
      line-height: 1.4;
      max-width: 760px;
    }
    h1 {
      margin-bottom: 1rem;
    }
    form {
      display: grid;
      gap: 0.9rem;
    }
    label {
      font-weight: 600;
      display: block;
      margin-bottom: 0.25rem;
    }
    input, select, textarea, button {
      width: 100%;
      box-sizing: border-box;
      padding: 0.55rem;
      font-size: 0.95rem;
    }
    .inline-options {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    .inline-options label {
      margin: 0;
      font-weight: 400;
    }
    .checkbox-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .checkbox-row input {
      width: auto;
      margin: 0;
    }
    .button-row {
      display: flex;
      gap: 0.75rem;
    }
    .button-row button {
      width: auto;
      min-width: 11rem;
    }
    #form-debug {
      margin-top: 1.2rem;
      padding: 0.8rem;
      background: #f6f8fa;
      border: 1px solid #d0d7de;
      min-height: 8rem;
      white-space: pre-wrap;
    }
  </style>
</head>
<body>
  <h1>Dummy Job Application</h1>
  <p>Use this page to test Simplify autofill behavior on common ATS fields.</p>
  <p>This MVP check validates Simplify profile/account autofill; local resume upload automation is out of scope for now.</p>

  <form id="job-application-form">
    <div>
      <label for="first_name">First Name</label>
      <input id="first_name" name="first_name" type="text" autocomplete="given-name" required>
    </div>

    <div>
      <label for="last_name">Last Name</label>
      <input id="last_name" name="last_name" type="text" autocomplete="family-name" required>
    </div>

    <div>
      <label for="email">Email</label>
      <input id="email" name="email" type="email" autocomplete="email" required>
    </div>

    <div>
      <label for="phone">Phone</label>
      <input id="phone" name="phone" type="tel" autocomplete="tel">
    </div>

    <div>
      <label for="location">Location</label>
      <input id="location" name="location" type="text" autocomplete="address-level2">
    </div>

    <div>
      <label for="linkedin">LinkedIn URL</label>
      <input id="linkedin" name="linkedin" type="url" placeholder="https://www.linkedin.com/in/yourname">
    </div>

    <div>
      <label for="portfolio">Portfolio URL</label>
      <input id="portfolio" name="portfolio" type="url" placeholder="https://yourportfolio.com">
    </div>

    <div>
      <label for="resume">Resume upload</label>
      <input id="resume" name="resume" type="file" accept=".pdf">
    </div>

    <div>
      <label for="work_authorization">Work authorization</label>
      <select id="work_authorization" name="work_authorization">
        <option value="">Select an option</option>
        <option value="us_citizen">U.S. Citizen</option>
        <option value="permanent_resident">Permanent Resident</option>
        <option value="visa_holder">Visa Holder</option>
        <option value="other">Other</option>
      </select>
    </div>

    <div>
      <label>Need sponsorship</label>
      <div class="inline-options">
        <label for="sponsorship_yes">
          <input id="sponsorship_yes" name="sponsorship" type="radio" value="yes">
          Yes
        </label>
        <label for="sponsorship_no">
          <input id="sponsorship_no" name="sponsorship" type="radio" value="no">
          No
        </label>
      </div>
    </div>

    <div>
      <label for="years_experience">Years of experience</label>
      <select id="years_experience" name="years_experience">
        <option value="">Select an option</option>
        <option value="0-1">0-1</option>
        <option value="2-4">2-4</option>
        <option value="5-7">5-7</option>
        <option value="8+">8+</option>
      </select>
    </div>

    <div>
      <label for="motivation">Why do you want this job?</label>
      <textarea id="motivation" name="motivation" rows="5"></textarea>
    </div>

    <div class="checkbox-row">
      <input id="agreement" name="agreement" type="checkbox" value="agreed" required>
      <label for="agreement">I certify that the information provided is accurate.</label>
    </div>

    <div class="button-row">
      <button id="submit_application" name="submit_application" type="submit">Submit Application</button>
      <button id="dump_form_values" name="dump_form_values" type="button">Dump Form Values</button>
    </div>
  </form>

  <h2>Form Debug Output</h2>
  <pre id="form-debug">Click "Dump Form Values" to inspect current values.</pre>

  <script>
    (function () {
      var form = document.getElementById("job-application-form");
      var debugEl = document.getElementById("form-debug");
      var dumpButton = document.getElementById("dump_form_values");

      function collectFormSnapshot() {
        var fields = Array.prototype.slice.call(
          form.querySelectorAll("input, select, textarea")
        ).map(function (field) {
          var fieldType = (field.type || field.tagName || "").toLowerCase();
          var entry = {
            id: field.id || "",
            name: field.name || "",
            tag: field.tagName.toLowerCase(),
            type: fieldType
          };

          if (fieldType === "checkbox" || fieldType === "radio") {
            entry.checked = !!field.checked;
            entry.value = field.value || "";
            return entry;
          }

          if (fieldType === "file") {
            entry.files = Array.prototype.slice.call(field.files || []).map(function (file) {
              return file.name;
            });
            return entry;
          }

          entry.value = field.value || "";
          return entry;
        });

        return {
          total_fields: fields.length,
          fields: fields
        };
      }

      function dumpFormValues() {
        var snapshot = collectFormSnapshot();
        debugEl.textContent = JSON.stringify(snapshot, null, 2);
      }

      form.addEventListener("submit", function (event) {
        event.preventDefault();
        dumpFormValues();
      });

      dumpButton.addEventListener("click", dumpFormValues);
    })();
  </script>
</body>
</html>
